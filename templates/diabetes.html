<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">← Back</a>
        <span class="navbar-text text-white">Diabetes Prediction</span>
    </div>
</nav>

<div class="container py-5">

    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">Enter Patient Details</h3>

        <form id="diabetesForm">

            <!-- Patient Info -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Name</label>
                    <input type="text" class="form-control" name="patient_name" required>
                </div>

                <div class="col-md-4">
                    <label>Age</label>
                    <input type="number" class="form-control" name="age" required>
                </div>

                <div class="col-md-4">
                    <label>Gender</label>
                    <select class="form-control" name="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>

            <!-- Medical Inputs -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Pregnancies</label>
                    <input type="number" class="form-control" name="pregnancies">
                </div>

                <div class="col-md-4">
                    <label>Glucose Level</label>
                    <select class="form-control" name="glucose">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Blood Pressure</label>
                    <select class="form-control" name="blood_pressure">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Skin Thickness</label>
                    <select class="form-control" name="skin_thickness">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Insulin</label>
                    <select class="form-control" name="insulin">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>BMI</label>
                    <select class="form-control" name="bmi">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label>Diabetes Pedigree</label>
                    <select class="form-control" name="diabetes_pedigree">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Age Category</label>
                    <select class="form-control" name="age_level">
                        <option value="low">Young</option>
                        <option value="normal">Middle</option>
                        <option value="high">Old</option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary btn-lg">
                    Predict
                </button>
            </div>

        </form>
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="card shadow mt-4 p-4 d-none">
        <h4>Prediction Result</h4>
        <p id="resultText"></p>
        <p><strong>Confidence:</strong> <span id="confidence"></span></p>
        <p><strong>Risk Level:</strong> <span id="risk"></span></p>

        <button id="downloadBtn" class="btn btn-success mt-2">
            Download PDF Report
        </button>
    </div>

</div>

<script>
document.getElementById("diabetesForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("/api/predict/diabetes", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.success){
        document.getElementById("resultBox").classList.remove("d-none");

        document.getElementById("resultText").innerText = result.data.result;
        document.getElementById("confidence").innerText = result.data.confidence;
        document.getElementById("risk").innerText = result.data.risk_level;

        document.getElementById("downloadBtn").onclick = async () => {
            const res = await fetch(`/api/report/generate/${result.data.history_id}`);
            const data = await res.json();
            window.open(data.data.download_url, "_blank");
        }
    } else {
        alert(result.message);
    }
});
</script>

</body>
</html>
