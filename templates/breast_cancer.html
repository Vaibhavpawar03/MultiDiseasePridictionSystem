<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breast Cancer Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">← Back</a>
        <span class="navbar-text text-white">Breast Cancer Prediction</span>
    </div>
</nav>

<div class="container py-5">

    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">Enter Patient Details</h3>

        <form id="breastCancerForm">

            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Name</label>
                    <input type="text" class="form-control" name="patient_name" required>
                </div>

                <div class="col-md-4">
                    <label>Age</label>
                    <input type="number" class="form-control" name="age" required>
                </div>

                <div class="col-md-4">
                    <label>Gender</label>
                    <select class="form-control" name="gender">
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>

            <h5 class="mt-4 mb-3">Mean Values</h5>
            <div class="row mb-3">
                <div class="col-md-4"><label>Radius Mean</label><select class="form-control" name="radius_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Texture Mean</label><select class="form-control" name="texture_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Perimeter Mean</label><select class="form-control" name="perimeter_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4"><label>Area Mean</label><select class="form-control" name="area_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Smoothness Mean</label><select class="form-control" name="smoothness_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Compactness Mean</label><select class="form-control" name="compactness_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4"><label>Concavity Mean</label><select class="form-control" name="concavity_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Concave Points Mean</label><select class="form-control" name="concave_points_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Symmetry Mean</label><select class="form-control" name="symmetry_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4"><label>Fractal Dimension Mean</label><select class="form-control" name="fractal_dimension_mean"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <h5 class="mt-4 mb-3">Standard Error Values</h5>
            <div class="row mb-3">
                <div class="col-md-4"><label>Radius SE</label><select class="form-control" name="radius_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Texture SE</label><select class="form-control" name="texture_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Perimeter SE</label><select class="form-control" name="perimeter_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4"><label>Area SE</label><select class="form-control" name="area_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Smoothness SE</label><select class="form-control" name="smoothness_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Compactness SE</label><select class="form-control" name="compactness_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4"><label>Concavity SE</label><select class="form-control" name="concavity_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Concave Points SE</label><select class="form-control" name="concave_points_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Symmetry SE</label><select class="form-control" name="symmetry_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4"><label>Fractal Dimension SE</label><select class="form-control" name="fractal_dimension_se"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <h5 class="mt-4 mb-3">Worst Values</h5>
            <div class="row mb-3">
                <div class="col-md-4"><label>Radius Worst</label><select class="form-control" name="radius_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Texture Worst</label><select class="form-control" name="texture_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Perimeter Worst</label><select class="form-control" name="perimeter_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4"><label>Area Worst</label><select class="form-control" name="area_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Smoothness Worst</label><select class="form-control" name="smoothness_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Compactness Worst</label><select class="form-control" name="compactness_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4"><label>Concavity Worst</label><select class="form-control" name="concavity_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Concave Points Worst</label><select class="form-control" name="concave_points_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
                <div class="col-md-4"><label>Symmetry Worst</label><select class="form-control" name="symmetry_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="row mb-4">
                <div class="col-md-4"><label>Fractal Dimension Worst</label><select class="form-control" name="fractal_dimension_worst"><option value="low">Low</option><option value="normal">Normal</option><option value="high">High</option></select></div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-success btn-lg">Predict</button>
            </div>

        </form>
    </div>

    <div id="resultBox" class="card shadow mt-4 p-4 d-none">
        <h4>Prediction Result</h4>
        <p id="resultText"></p>
        <p><strong>Confidence:</strong> <span id="confidence"></span></p>
        <p><strong>Risk Level:</strong> <span id="risk"></span></p>

        <button id="downloadBtn" class="btn btn-success mt-2">
            Download PDF Report
        </button>
    </div>

</div>

<script>
document.getElementById("breastCancerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("/api/predict/breast-cancer", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.success){
        document.getElementById("resultBox").classList.remove("d-none");

        document.getElementById("resultText").innerText = result.data.result;
        document.getElementById("confidence").innerText = result.data.confidence;
        document.getElementById("risk").innerText = result.data.risk_level;

        document.getElementById("downloadBtn").onclick = async () => {
            const res = await fetch(`/api/report/generate/${result.data.history_id}`);
            const data = await res.json();
            window.open(data.data.download_url, "_blank");
        }
    } else {
        alert(result.message);
    }
});
</script>

</body>
</html>
