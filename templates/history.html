<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">← Back</a>
        <span class="navbar-text text-white">Prediction History</span>
    </div>
</nav>

<div class="container py-5">
    <div class="card shadow p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">Saved Prediction Records</h3>
            <button class="btn btn-outline-primary" onclick="loadHistory()">Refresh</button>
        </div>

        <div class="table-responsive">
            <table class="table table-bordered table-striped align-middle" id="historyTable">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Patient Name</th>
                        <th>Age</th>
                        <th>Gender</th>
                        <th>Disease</th>
                        <th>Result</th>
                        <th>Confidence</th>
                        <th>Risk</th>
                        <th>Date</th>
                        <th>Report</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr>
                        <td colspan="10" class="text-center">Loading history...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function loadHistory() {
    const tbody = document.getElementById("historyBody");
    tbody.innerHTML = `<tr><td colspan="10" class="text-center">Loading history...</td></tr>`;

    try {
        const response = await fetch("/api/history");
        const result = await response.json();

        if (!result.success) {
            tbody.innerHTML = `<tr><td colspan="10" class="text-center text-danger">${result.message}</td></tr>`;
            return;
        }

        if (!result.data || result.data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" class="text-center">No prediction history found.</td></tr>`;
            return;
        }

        tbody.innerHTML = "";

        result.data.forEach(item => {
            const confidencePercent = (Number(item.confidence) * 100).toFixed(2) + "%";

            const row = `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.patient_name}</td>
                    <td>${item.age}</td>
                    <td>${item.gender}</td>
                    <td>${item.disease_type}</td>
                    <td>${item.prediction_result}</td>
                    <td>${confidencePercent}</td>
                    <td>${item.risk_level}</td>
                    <td>${item.created_at}</td>
                    <td>
                        <button class="btn btn-sm btn-success" onclick="downloadReport(${item.id})">
                            PDF
                        </button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });

    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="10" class="text-center text-danger">Failed to load history.</td></tr>`;
    }
}

async function downloadReport(historyId) {
    try {
        const response = await fetch(`/api/report/generate/${historyId}`);
        const result = await response.json();

        if (result.success) {
            window.open(result.data.download_url, "_blank");
        } else {
            alert(result.message);
        }
    } catch (error) {
        alert("Unable to generate report.");
    }
}

loadHistory();
</script>

</body>
</html>
