<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark custom-navbar">
    <div class="container">
        <a class="navbar-brand" href="/">← Back</a>
        <span class="navbar-text text-white">Heart Disease Prediction</span>
    </div>
</nav>

<div class="container py-5">

    <div class="card shadow p-4">
        <h3 class="mb-4 text-center">Enter Patient Details</h3>

        <form id="heartForm">

            <!-- Patient Info -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Name</label>
                    <input type="text" class="form-control" name="patient_name" required>
                </div>

                <div class="col-md-4">
                    <label>Age</label>
                    <input type="number" class="form-control" name="age" required>
                </div>

                <div class="col-md-4">
                    <label>Gender</label>
                    <select class="form-control" name="gender">
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>
            </div>

            <!-- Medical Inputs -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Chest Pain Type</label>
                    <select class="form-control" name="chest_pain">
                        <option value="0">Typical</option>
                        <option value="1">Atypical</option>
                        <option value="2">Non-anginal</option>
                        <option value="3">Asymptomatic</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Resting Blood Pressure</label>
                    <select class="form-control" name="resting_bp">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Cholesterol</label>
                    <select class="form-control" name="cholesterol">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Fasting Blood Sugar > 120</label>
                    <select class="form-control" name="fasting_bs">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Rest ECG</label>
                    <select class="form-control" name="rest_ecg">
                        <option value="0">Normal</option>
                        <option value="1">ST-T abnormality</option>
                        <option value="2">Left ventricular hypertrophy</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Max Heart Rate</label>
                    <select class="form-control" name="max_heart_rate">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label>Exercise Induced Angina</label>
                    <select class="form-control" name="exercise_angina">
                        <option value="yes">Yes</option>
                        <option value="no">No</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Oldpeak</label>
                    <select class="form-control" name="oldpeak">
                        <option value="low">Low</option>
                        <option value="normal">Normal</option>
                        <option value="high">High</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label>Slope</label>
                    <select class="form-control" name="slope">
                        <option value="0">Upsloping</option>
                        <option value="1">Flat</option>
                        <option value="2">Downsloping</option>
                    </select>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label>Number of Major Vessels (ca)</label>
                    <select class="form-control" name="ca">
                        <option value="0">0</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Thal</label>
                    <select class="form-control" name="thal">
                        <option value="0">Normal</option>
                        <option value="1">Fixed defect</option>
                        <option value="2">Reversible defect</option>
                    </select>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-danger btn-lg">
                    Predict
                </button>
            </div>

        </form>
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="card shadow mt-4 p-4 d-none">
        <h4>Prediction Result</h4>
        <p id="resultText"></p>
        <p><strong>Confidence:</strong> <span id="confidence"></span></p>
        <p><strong>Risk Level:</strong> <span id="risk"></span></p>

        <button id="downloadBtn" class="btn btn-success mt-2">
            Download PDF Report
        </button>
    </div>

</div>

<script>
document.getElementById("heartForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const data = Object.fromEntries(formData.entries());

    const response = await fetch("/api/predict/heart", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.success){
        document.getElementById("resultBox").classList.remove("d-none");

        document.getElementById("resultText").innerText = result.data.result;
        document.getElementById("confidence").innerText = result.data.confidence;
        document.getElementById("risk").innerText = result.data.risk_level;

        document.getElementById("downloadBtn").onclick = async () => {
            const res = await fetch(`/api/report/generate/${result.data.history_id}`);
            const data = await res.json();
            window.open(data.data.download_url, "_blank");
        }
    } else {
        alert(result.message);
    }
});
</script>

</body>
</html>
